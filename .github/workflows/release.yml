name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux binary
        run: |
          g++ -std=c++20 -O3 -DNDEBUG -s \
              -o tetris-linux-x86_64 \
              main.cpp game.cpp ansi_renderer.cpp

      - name: Package
        run: tar -czf tetris-linux-x86_64.tar.gz tetris-linux-x86_64 README.md

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: tetris-linux-x86_64.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: sudo apt-get install -y mingw-w64

      - name: Build Windows binary
        run: |
          x86_64-w64-mingw32-g++ -std=c++20 -O3 -DNDEBUG -s -static \
              -o tetris-windows-x86_64.exe \
              main.cpp game.cpp windows_renderer.cpp

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: tetris-windows-x86_64.exe

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { name: linux }
      - uses: actions/download-artifact@v4
        with: { name: windows }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tetris-linux-x86_64.tar.gz
            tetris-windows-x86_64.exe
          body: |
            ## Tetris — ${{ github.ref_name }}

            C++20 Tetris clone. No external libraries — just a terminal.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86-64 | `tetris-linux-x86_64.tar.gz` |
            | Windows x86-64 | `tetris-windows-x86_64.exe` |

            ### Linux
            ```
            tar -xzf tetris-linux-x86_64.tar.gz
            ./tetris-linux-x86_64
            ```

            ### Windows
            Double-click `tetris-windows-x86_64.exe` or run from any terminal.
            Requires Windows 10 v1511+ for ANSI colour support.

            ### Controls
            | Key | Action |
            |-----|--------|
            | ← → | Move |
            | ↑ | Rotate (SRS) |
            | ↓ | Soft drop |
            | Space | Hard drop |
            | Q | Quit |
