name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.0.0)'
        required: true
        default: 'v2.0.0'

jobs:
  # ── Manual release from pre-built dist/ binaries ──────────────────────────
  publish-dist:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release from dist/
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "Tetris ${{ github.event.inputs.tag }} — Multi-renderer release"
          target_commitish: main
          files: dist/*
          body: |
            ## Tetris ${{ github.event.inputs.tag }} — Multi-renderer release

            Three renderer backends are now available:

            | Binary | Renderer | Platform |
            |--------|----------|----------|
            | `tetris-linux-x86_64` | Terminal (ncurses) | Linux |
            | `tetris-pixel-linux-x86_64` | Pixel-art terminal | Linux |
            | `tetris-windows-x86_64.exe` | Windows Console | Windows |
            | `tetris-pixel-windows-x86_64.exe` | Windows Console pixel-art | Windows |

            A **Vulkan + GLFW** sprite renderer is also included in source (`make vulkan`).
            Requires Vulkan SDK and GLFW3 to build.

            ## Building from source
            ```sh
            # Terminal renderer (Linux/macOS)
            make tetris

            # Pixel-art renderer
            make pixel

            # Vulkan renderer (requires vulkan-sdk, libglfw3-dev)
            make vulkan
            ```

            ## Controls
            | Key | Action |
            |-----|--------|
            | ← → | Move |
            | ↑ | Rotate (SRS) |
            | ↓ | Soft drop |
            | Space | Hard drop |
            | Q | Quit |

  # ── Automated release from tag push (builds from source) ──────────────────
  build-linux:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux binary
        run: |
          g++ -std=c++20 -O3 -DNDEBUG -s \
              -o tetris-linux-x86_64 \
              main.cpp game.cpp ansi_renderer.cpp

      - name: Package
        run: tar -czf tetris-linux-x86_64.tar.gz tetris-linux-x86_64 README.md

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: tetris-linux-x86_64.tar.gz

  build-windows:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: sudo apt-get install -y mingw-w64

      - name: Build Windows binary
        run: |
          x86_64-w64-mingw32-g++ -std=c++20 -O3 -DNDEBUG -s -static \
              -o tetris-windows-x86_64.exe \
              main.cpp game.cpp windows_renderer.cpp

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: tetris-windows-x86_64.exe

  publish-tag:
    if: github.event_name == 'push'
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: linux }
      - uses: actions/download-artifact@v4
        with: { name: windows }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tetris-linux-x86_64.tar.gz
            tetris-windows-x86_64.exe
          body: |
            ## Tetris — ${{ github.ref_name }}

            C++20 Tetris clone with multiple renderer backends.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86-64 | `tetris-linux-x86_64.tar.gz` |
            | Windows x86-64 | `tetris-windows-x86_64.exe` |

            ### Controls
            | Key | Action |
            |-----|--------|
            | ← → | Move |
            | ↑ | Rotate (SRS) |
            | ↓ | Soft drop |
            | Space | Hard drop |
            | Q | Quit |
